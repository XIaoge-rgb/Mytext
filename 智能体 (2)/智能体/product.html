<head>

<title>产品服务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#1a1a1a;color:#fff;line-height:1.6}
nav{background:#222;padding:18px 30px;position:sticky;top:0;z-index:99}
.nav-box{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.nav-left{display:flex;gap:30px}
nav a{color:#fff;text-decoration:none;font-size:18px}
nav a:hover{color:#409eff}
.btn-login{background:#409eff;color:#fff;padding:8px 16px;border-radius:6px;border:none;cursor:pointer}
.container{max-width:1200px;margin:40px auto;padding:0 20px}
.card{background:#2a2a2a;padding:30px;border-radius:12px;margin-bottom:25px}
.pro-box{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:20px}
.pro-item{background:#333;padding:20px;border-radius:10px;text-align:center}
/* 核心修改：图片大小适配，统一显示效果 */
.pro-item img{
  width: 100%;
  height: 300px; /* 调高图片高度，更清晰展示细节 */
  object-fit: cover; /* 保持图片比例，裁剪多余部分，不拉伸 */
  border-radius:8px;
  margin-bottom:15px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
.pro-item h3{margin-bottom:10px;color:#409eff}
.pro-item p{color:#ccc;font-size:14px}
footer{background:#222;text-align:center;padding:25px;color:#aaa;margin-top:50px}
/* 移动端适配：小屏时图片高度自适应 */
@media (max-width:768px){
  .pro-box{grid-template-columns:1fr}
  .pro-item img{height: auto;max-height: 200px;}
}
</style>
</head>

  </div>
  <div class="pro-box">

      <p>可视化床体状态，超温自动报警，全方位守护理疗安全</p>
    </div>
    <div class="pro-item">
